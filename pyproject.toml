[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [".venv"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]
# main.py intentionally configures Panda3D before importing Ursina. Existing
# entity assignments are also intentionally retained for scene construction.
ignore = ["E402", "F401", "F841"]

[tool.pytest.ini_options]
addopts = "-ra --strict-config --strict-markers"
testpaths = ["tests"]
